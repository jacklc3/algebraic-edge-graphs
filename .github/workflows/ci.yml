name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ghc: ['9.6.6', '9.8.4', '9.10.1', '9.12.1']

    name: GHC ${{ matrix.ghc }}
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: ${{ runner.os }}-ghc-${{ matrix.ghc }}-${{ hashFiles('algebraic-edge-graphs.cabal') }}
          restore-keys: ${{ runner.os }}-ghc-${{ matrix.ghc }}-

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all

      - name: Haddock
        run: cabal haddock all

      - name: Check
        run: cabal check
